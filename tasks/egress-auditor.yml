---

- name: Download egress-auditor binary
  ansible.builtin.get_url:
    url: "https://github.com/devops-works/egress-auditor/releases/download/{{ egress_auditor_version }}/egress-auditor_linux_{{ egress_auditor_arch }}"
    dest: "{{ egress_auditor_bin_path }}"
    mode: "0755"
    owner: root
    group: root
  notify: Restart egress-auditor

- name: Set cap_net_admin capability on binary
  community.general.capabilities:
    path: "{{ egress_auditor_bin_path }}"
    capability: cap_net_admin+ep
    state: present
  when: egress_auditor_setcap | bool

- name: Deploy systemd unit file
  ansible.builtin.template:
    src: egress-auditor.service.j2
    dest: /etc/systemd/system/egress-auditor.service
    owner: root
    group: root
    mode: "0644"
  notify: Restart egress-auditor

- name: Create nftables custom rules directory
  ansible.builtin.file:
    path: /etc/nftables.d/custom
    state: directory
    owner: root
    group: root
    mode: "0755"
  when:
    - egress_auditor_nflog_manage_rules | bool
    - egress_auditor_input == 'nflog'

- name: Deploy nftables rules for egress-auditor
  ansible.builtin.template:
    src: egress-auditor.nft.j2
    dest: /etc/nftables.d/custom/egress-auditor.nft
    owner: root
    group: root
    mode: "0644"
  notify: Reload egress-auditor nftables rules
  when:
    - egress_auditor_nflog_manage_rules | bool
    - egress_auditor_input == 'nflog'

- name: Deploy logrotate configuration
  ansible.builtin.template:
    src: egress-auditor.logrotate.j2
    dest: /etc/logrotate.d/egress-auditor
    owner: root
    group: root
    mode: "0644"
  when: egress_auditor_logrotate | bool

- name: Enable and start egress-auditor
  ansible.builtin.systemd:
    name: egress-auditor
    enabled: true
    state: started
    daemon_reload: true
